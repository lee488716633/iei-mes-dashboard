<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>物流戰情室</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">IEI 物流空間戰情室</h1>
        
        <div class="flex gap-6 mb-8 p-6 bg-slate-800 border-2 border-emerald-500 rounded-2xl">
            <div class="text-center">
                <span class="text-gray-400 text-sm">倉儲溫度</span>
                <div class="text-4xl font-black text-emerald-400">23.5°C</div>
            </div>
            <div class="text-center">
                <span class="text-gray-400 text-sm">環境濕度</span>
                <div class="text-4xl font-black text-emerald-400">48%</div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4">棧板使用率概況</h2>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-slate-700 p-4 rounded-lg">1樓：<span class="text-green-400 font-bold">85%</span></div>
                <div class="bg-slate-700 p-4 rounded-lg">B1/6F：<span class="text-green-400 font-bold">70%</span></div>
                <div class="bg-slate-700 p-4 rounded-lg">新廠：<span class="text-yellow-400 font-bold">92%</span></div>
            </div>
        </div>
    </div>
</body>
</html>
